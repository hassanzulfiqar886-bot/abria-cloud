<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141C45"/>
      <stop offset="100%" stop-color="#0A0E27"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA94D"/>
      <stop offset="100%" stop-color="#F38B2A"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F38B2A" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#F38B2A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F38B2A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded panel -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Conic-style accent ring (approx with two arcs) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34E4EA" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Halo -->
  <circle cx="32" cy="29" r="22" fill="url(#halo)"/>

  <!-- Lightbulb -->
  <path d="M32 12 C22 12 16 20 16 28 C16 34 19 39 23 42 L23 47 L41 47 L41 42 C45 39 48 34 48 28 C48 20 42 12 32 12 Z"
        fill="url(#glow)"/>
  <!-- Inner highlight -->
  <path d="M28 18 C24 20 22 24 22 28" stroke="#FFD89A" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Base -->
  <rect x="24" y="49" width="16" height="3" rx="1.5" fill="#F4F6FF"/>
  <rect x="26" y="54" width="12" height="3" rx="1.5" fill="#F4F6FF"/>

  <!-- Pixel accents -->
  <rect x="50" y="14" width="3" height="3" fill="#34E4EA"/>
  <rect x="54" y="14" width="3" height="3" fill="#F38B2A"/>
  <rect x="50" y="18" width="3" height="3" fill="#F38B2A"/>
</svg>
